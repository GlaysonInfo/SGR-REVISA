<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SGR REVISA</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="login-screen" class="login-screen">
      <section class="login-art" aria-label="REVISA">
        <img src="assets/Logo REVISA.png" alt="REVISA" class="brand-logo" />
        <div class="login-photo"></div>
      </section>
      <section class="login-panel" aria-label="Acesso">
        <div>
          <p class="eyebrow">Sistema de Gestão Integrada</p>
          <h1>REVISA</h1>
          <p class="muted">Acesso seguro para captação, polos, compras, emendas e prestação de contas.</p>
        </div>
        <form id="login-form" class="stack">
          <label>
            Login
            <input name="login" autocomplete="username" value="admin@sgr.local" required />
          </label>
          <label>
            Senha
            <input name="senha" type="password" autocomplete="current-password" value="admin123" required />
          </label>
          <button type="submit" class="primary">Entrar</button>
          <p id="login-error" class="error" role="alert"></p>
        </form>
        <div class="demo-users">
          <strong>Acessos de teste</strong>
          <span>admin@sgr.local / admin123</span>
          <span>revisa@sgr.local / revisa123</span>
          <span>polo@sgr.local / polo123</span>
          <span>mobile@sgr.local / mobile123</span>
        </div>
      </section>
    </main>

    <div id="app-shell" class="app-shell hidden">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <img src="assets/Logo REVISA.png" alt="REVISA" />
          <span>SGR</span>
        </div>
        <nav id="main-nav" class="nav"></nav>
      </aside>
      <div class="workspace">
        <header class="topbar">
          <div class="topbar-main">
            <button id="sidebar-toggle" class="sidebar-toggle" type="button" aria-label="Abrir menu" aria-expanded="true">
              <span></span>
              <span></span>
              <span></span>
            </button>
            <div>
            <p id="profile-line" class="eyebrow">Perfil</p>
            <h2 id="view-title">Dashboard</h2>
            </div>
          </div>
          <div class="topbar-actions">
            <span id="connection-pill" class="pill good">Online</span>
            <button id="logout-button" class="secondary">Sair</button>
          </div>
        </header>
        <section id="toast" class="toast hidden" role="status"></section>
        <section id="app-view" class="view"></section>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
